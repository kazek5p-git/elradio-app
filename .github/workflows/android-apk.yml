name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Build standalone APK
        working-directory: android
        run: NODE_ENV=production ./gradlew :app:assembleRelease -x lintVitalAnalyzeRelease -x lintVitalRelease -x lint

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/EL-Radio.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EL-Radio-android-apk
          path: dist/EL-Radio.apk

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EL-Radio.apk

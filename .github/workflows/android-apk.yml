name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Prepare app build metadata
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "EXPO_PUBLIC_ELRADIO_BUILD_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_ELRADIO_BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Build standalone APK
        working-directory: android
        run: NODE_ENV=production ./gradlew :app:assembleRelease -x lintVitalAnalyzeRelease -x lintVitalRelease -x lint

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/EL-Radio.apk
          VERSION="$(node -p "require('./app.json').expo.version")"
          cat > dist/EL-Radio-release.json <<EOF
          {
            "commit": "$GITHUB_SHA",
            "buildTime": "$EXPO_PUBLIC_ELRADIO_BUILD_TIME",
            "version": "$VERSION",
            "tag": "latest-build",
            "assets": {
              "android": {
                "name": "EL-Radio.apk",
                "url": "https://github.com/kazek5p-git/elradio-app/releases/download/latest-build/EL-Radio.apk"
              },
              "ios": {
                "name": "EL-Radio-unsigned.ipa",
                "url": "https://github.com/kazek5p-git/elradio-app/releases/download/latest-build/EL-Radio-unsigned.ipa"
              }
            }
          }
          EOF

      - name: Upload rolling release APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="latest-build"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "EL Radio latest build" --notes "Rolling private build for sideload installation." --prerelease || true
          gh release upload "$TAG" dist/EL-Radio.apk dist/EL-Radio-release.json --clobber

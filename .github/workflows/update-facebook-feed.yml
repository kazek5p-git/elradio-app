name: Update Facebook Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/update-facebook-feed.mjs
      - name: Commit feed update
        run: |
          set -euo pipefail
          if git diff --quiet -- data/facebook-feed.json; then
            echo "Facebook feed is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facebook-feed.json
          git commit -m "Update Facebook feed"
          git push

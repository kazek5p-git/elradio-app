name: iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare app build metadata
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "EXPO_PUBLIC_ELRADIO_BUILD_SHA=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_ELRADIO_BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Build unsigned app
        run: |
          set -euo pipefail
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"
          if [ -z "$WORKSPACE" ]; then
            echo "No xcworkspace generated under ios/"
            exit 1
          fi
          SCHEME_PATH="$(find ios -path '*/xcshareddata/xcschemes/*.xcscheme' ! -path '*/Pods/*' -print -quit)"
          if [ -z "$SCHEME_PATH" ]; then
            echo "No app xcscheme found"
            exit 1
          fi
          SCHEME="$(basename "$SCHEME_PATH" .xcscheme)"
          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme found"
            exit 1
          fi
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
          APP_PATH="$(find build -path '*Release-iphoneos/*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app product found"
            exit 1
          fi
          rm -rf Payload dist
          mkdir -p Payload dist
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload dist/EL-Radio-unsigned.ipa
          VERSION="$(node -p "require('./app.json').expo.version")"
          cat > dist/EL-Radio-release.json <<EOF
          {
            "commit": "$GITHUB_SHA",
            "buildTime": "$EXPO_PUBLIC_ELRADIO_BUILD_TIME",
            "version": "$VERSION",
            "tag": "latest-build",
            "assets": {
              "android": {
                "name": "EL-Radio.apk",
                "url": "https://github.com/kazek5p-git/elradio-app/releases/download/latest-build/EL-Radio.apk"
              },
              "ios": {
                "name": "EL-Radio-unsigned.ipa",
                "url": "https://github.com/kazek5p-git/elradio-app/releases/download/latest-build/EL-Radio-unsigned.ipa"
              }
            }
          }
          EOF

      - name: Upload rolling release IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="latest-build"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "EL Radio latest build" --notes "Rolling private build for sideload installation." --prerelease || true
          gh release upload "$TAG" dist/EL-Radio-unsigned.ipa dist/EL-Radio-release.json --clobber
